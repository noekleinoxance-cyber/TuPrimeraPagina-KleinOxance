<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Bitácora IT{% endblock %}</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1b33;
      --line:#22324f;
      --text:#e7eefc;
      --muted:#a9b7d6;
      --accent:#60a5fa;
      --ok:#22c55e;
      --danger:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,Segoe UI,Roboto,Arial;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{max-width:980px;margin:0 auto;padding:18px}

    .nav{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
    }

    .brand{ font-weight:900;
  font-size:22px;
  letter-spacing:0.8px;
  color:var(--accent);}

    .nav a{
      text-decoration:none;
      padding:7px 10px;
      border-radius:10px;
      border:1px solid transparent;
      color:var(--text);
    }

    .nav a:hover{border-color:var(--line)}

    .pill{
      margin-left:auto;
      font-size:12px;
      color:var(--muted);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      margin:12px 0;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    h1,h2,h3{margin:0 0 10px 0}

    p{
      margin:10px 0;
      color:var(--muted);
      line-height:1.5;
    }

    .meta{font-size:12px;color:var(--muted)}

    hr{border:0;border-top:1px solid var(--line);margin:14px 0}

    input,select,textarea{
      width:100%;
      max-width:760px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#071226;
      color:var(--text);
      outline:none;
    }

    textarea{min-height:140px}

    button, .btn{
      display:inline-block;
      padding:8px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      cursor:pointer;
      text-decoration:none;
    }

    .btn:hover, button:hover{border-color:var(--accent)}
    .btn-ok{border-color:rgba(34,197,94,.55)}
    .btn-danger{border-color:rgba(239,68,68,.55)}

    .title a{
      text-decoration:none;
      font-weight:800;
      color:var(--text);
    }
    .title a:hover{color:var(--accent)}
  </style>
</head>
<body>

  <div class="wrap">
    <div class="nav">
      <div class="brand">Mesa de Ayuda IT</div>

      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'listar_posts' %}">Posts</a>
      <a href="{% url 'buscar_post' %}">Buscar</a>
      <a href="{% url 'crear_post' %}">Nuevo</a>
      <a href="{% url 'crear_autor' %}">Autor</a>
      <a href="{% url 'crear_categoria' %}">Categoría</a>
      <a href="{% url 'about' %}">About</a>

      {% if user.is_authenticated %}
          <a href="{% url 'logout' %}">Logout</a>
      {% else %}
          <a href="{% url 'login' %}">Login</a>
           <a href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>

    {% block content %}{% endblock %}
  </div>

</body>
</html>
