{% extends "blog/base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}

<div class="card">

    <h2>Crear cuenta</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
            {% if form.errors %}
            <div style="color:#ff6b6b">
            {{ form.errors }}
            </div>
            {% endif %}

        <button class="btn">Registrarse</button>
    </form>

</div>

{% endblock %}
