{% extends "blog/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="card">
    <h2>Iniciar sesión</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-ok" type="submit">
            Ingresar
        </button>
    </form>
</div>

{% endblock %}
